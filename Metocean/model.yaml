Metocean:
  description: This data model represents metocean information (meteorology + oceanography) for a given period and location. It supports both time-series measures and forecasts using points with observed data samples
  properties:
    address:
      description: The mailing address
      properties:
        addressCountry:
          description: The country. For example, Spain
          type: string
          x-ngsi:
            model: https://schema.org/addressCountry
            type: Property
        addressLocality:
          description: The locality in which the street address is, and which is in the region
          type: string
          x-ngsi:
            model: https://schema.org/addressLocality
            type: Property
        addressRegion:
          description: The region in which the locality is, and which is in the country
          type: string
          x-ngsi:
            model: https://schema.org/addressRegion
            type: Property
        district:
          description: A district is a type of administrative division that, in some countries, is managed by the local government
          type: string
          x-ngsi:
            type: Property
        postOfficeBoxNumber:
          description: The post office box number for PO box addresses. For example, 03578
          type: string
          x-ngsi:
            model: https://schema.org/postOfficeBoxNumber
            type: Property
        postalCode:
          description: The postal code. For example, 24004
          type: string
          x-ngsi:
            model: https://schema.org/https://schema.org/postalCode
            type: Property
        streetAddress:
          description: The street address
          type: string
          x-ngsi:
            model: https://schema.org/streetAddress
            type: Property
        streetNr:
          description: Number identifying a specific property on a public street
          type: string
          x-ngsi:
            type: Property
      type: object
      x-ngsi:
        model: https://schema.org/address
        type: Property
    alternateName:
      description: An alternative name for this item
      type: string
      x-ngsi:
        type: Property
    areaServed:
      description: The geographic area where a service or offered item is provided
      type: string
      x-ngsi:
        model: https://schema.org/Text
        type: Property
    code:
      description: Metocean product/area code or identifier of the computation set
      type: string
      x-ngsi:
        model: https://schema.org/Text
        type: Property
    collectionName:
      description: Logical name of the metocean collection (e.g. '10-min-metocean-measures', '12hour-daily-forecast')
      type: string
      x-ngsi:
        model: https://schema.org/Text
        type: Property
    dataProvider:
      description: A sequence of characters identifying the provider of the harmonised data entity
      type: string
      x-ngsi:
        type: Property
    dateCreated:
      description: Entity creation timestamp. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    dateModified:
      description: Timestamp of the last modification of the entity. This will usually be allocated by the storage platform
      format: date-time
      type: string
      x-ngsi:
        type: Property
    description:
      description: A description of this item
      type: string
      x-ngsi:
        type: Property
    fromDate:
      description: ISO 8601 UTC start of the metocean period covered by this entity
      format: date-time
      type: string
      x-ngsi:
        type: Property
    id:
      anyOf:
        - description: Identifier format of any NGSI entity
          maxLength: 256
          minLength: 1
          pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
          type: string
          x-ngsi:
            type: Property
        - description: Identifier format of any NGSI entity
          format: uri
          type: string
          x-ngsi:
            type: Property
      description: Unique identifier of the entity
      x-ngsi:
        type: Relationship
    location:
      description: Geojson reference to the item. It can be Point, LineString, Polygon, MultiPoint, MultiLineString or MultiPolygon
      oneOf:
        - description: Geojson reference to the item. Point
          properties:
            bbox:
              description: BBox of the  Point
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Point
              items:
                type: number
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Point
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Point
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. LineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the LineString
              items:
                items:
                  type: number
                minItems: 2
                type: array
              minItems: 2
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - LineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON LineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. Polygon
          properties:
            bbox:
              description: BBox coordinates of the Polygon
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the Polygon
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 4
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - Polygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON Polygon
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiPoint
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MulitPoint
              items:
                items:
                  type: number
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPoint
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPoint
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              description: BBox coordinates of the LineString
              items:
                type: number
              minItems: 4
              type: array
              x-ngsi:
                type: Property
            coordinates:
              description: Coordinates of the MultiLineString
              items:
                items:
                  items:
                    type: number
                  minItems: 2
                  type: array
                minItems: 2
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiLineString
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiLineString
          type: object
          x-ngsi:
            type: GeoProperty
        - description: Geojson reference to the item. MultiLineString
          properties:
            bbox:
              items:
                type: number
              minItems: 4
              type: array
            coordinates:
              description: Coordinates of the MultiPolygon
              items:
                items:
                  items:
                    items:
                      type: number
                    minItems: 2
                    type: array
                  minItems: 4
                  type: array
                type: array
              type: array
              x-ngsi:
                type: Property
            type:
              enum:
                - MultiPolygon
              type: string
          required:
            - type
            - coordinates
          title: GeoJSON MultiPolygon
          type: object
          x-ngsi:
            type: GeoProperty
      x-ngsi:
        type: GeoProperty
    modifiedAt:
      description: ISO 8601 UTC timestamp when the forecast or dataset was computed (if applicable)
      format: date-time
      type: string
      x-ngsi:
        type: Property
    name:
      description: The name of this item
      type: string
      x-ngsi:
        type: Property
    owner:
      description: A List containing a JSON encoded sequence of characters referencing the unique Ids of the owner(s)
      items:
        anyOf:
          - description: Identifier format of any NGSI entity
            maxLength: 256
            minLength: 1
            pattern: ^[\w\-\.\{\}\$\+\*\[\]`|~^@!,:\\]+$
            type: string
            x-ngsi:
              type: Property
          - description: Identifier format of any NGSI entity
            format: uri
            type: string
            x-ngsi:
              type: Property
        description: Unique identifier of the entity
        x-ngsi:
          type: Relationship
      type: array
      x-ngsi:
        type: Property
    points:
      description: Array of metocean points (sensors, grid points, prediction locations) each holding a time-series of data samples
      items:
        properties:
          data:
            description: Time-series of metocean samples for this point
            items:
              properties:
                currentDir:
                  description: Current direction in degrees (0–360)
                  maximum: 360
                  minimum: 0
                  type: number
                  x-ngsi:
                    model: https://schema.org/Number
                    type: Property
                currentSpeed:
                  description: Current speed in m/s
                  type: number
                  x-ngsi:
                    model: https://schema.org/Number
                    type: Property
                observedAt:
                  description: NGSI-LD observedAt timestamp for this data sample (ISO 8601, UTC preferred)
                  format: date-time
                  type: string
                  x-ngsi:
                    type: Property
                peakDateTime:
                  description: If applicable, ISO 8601 time of the nearest related tide peak (high or low)
                  format: date-time
                  type: string
                  x-ngsi:
                    type: Property
                peakHeight:
                  description: Height of the related tide peak in meters
                  type: number
                  x-ngsi:
                    model: https://schema.org/Number
                    type: Property
                peakType:
                  description: Type of tide peak (hightide/lowtide). May be empty when not applicable
                  enum:
                    - hightide
                    - lowtide
                    - ''
                  type: string
                  x-ngsi:
                    type: Property
                significantWaveHeight:
                  description: Significant wave height in meters
                  type: number
                  x-ngsi:
                    model: https://schema.org/Number
                    type: Property
                tideHeight:
                  description: Tide height or water level at this instant, referenced to local datum, in meters
                  type: number
                  x-ngsi:
                    model: https://schema.org/Number
                    type: Property
                tideHeight10mValues:
                  description: Optional intra-hour tide height values (e.g.10-minute steps within the hour around 'observedAt'), in meters
                  items:
                    description: Every element in the optional intra-hour tide height values
                    type: number
                    x-ngsi:
                      type: Property
                  type: array
                  x-ngsi:
                    model: https://schema.org/Number
                    type: Property
                waveDir:
                  description: Mean wave direction in degrees (0–360)
                  maximum: 360
                  minimum: 0
                  type: number
                  x-ngsi:
                    model: https://schema.org/Number
                    type: Property
                waveHeight:
                  description: Wave height in meters as provided by the source (often total or characteristic wave height)
                  type: number
                  x-ngsi:
                    model: https://schema.org/Number
                    type: Property
                wavePeakDir:
                  description: Peak wave direction in degrees (0–360), if provided by the source
                  maximum: 360
                  minimum: 0
                  type: number
                  x-ngsi:
                    model: https://schema.org/Number
                    type: Property
                wavePeakPeriod:
                  description: Peak wave period in seconds
                  type: number
                  x-ngsi:
                    model: https://schema.org/Number
                    type: Property
                windDir:
                  description: Wind direction in degrees (0–360)
                  maximum: 360
                  minimum: 0
                  type: number
                  x-ngsi:
                    model: https://schema.org/Number
                    type: Property
                windSpeed:
                  description: Wind speed in m/s
                  type: number
                  x-ngsi:
                    model: https://schema.org/Number
                    type: Property
              type: object
            type: array
            x-ngsi:
              type: Property
          dataNature:
            description: Nature of the data contained in this entity
            enum:
              - forecast
              - measure
              - measure-and-forecast
            type: string
            x-ngsi:
              type: Property
          pointCode:
            description: Numeric code of the metocean point (sensor, location or prediction point)
            type: number
            x-ngsi:
              model: https://schema.org/Number
              type: Property
          pointName:
            description: Human-readable name of the metocean point
            type: string
            x-ngsi:
              model: https://schema.org/Text
              type: Property
          pointType:
            description: Type of metocean point (e.g. 'current-meter', 'wave-gauge', 'wind-gauge', 'cma-prediction')
            enum:
              - cma-prediction
              - current-meter
              - ihm-prediction
              - tide-gauge
              - wave-gauge
              - wind-gauge
              - other
            type: string
            x-ngsi:
              model: https://schema.org/Text
              type: Property
          variables:
            description: Comma-separated list of variable names present in the 'data' array of this point (e.g. 'currentSpeed,currentDir,tideHeight')
            type: string
            x-ngsi:
              model: https://schema.org/Text
              type: Property
        type: object
      type: array
      x-ngsi:
        type: Property
    seeAlso:
      description: list of uri pointing to additional resources about the item
      oneOf:
        - items:
            format: uri
            type: string
          minItems: 1
          type: array
        - format: uri
          type: string
      x-ngsi:
        type: Property
    source:
      description: A sequence of characters giving the original source of the entity data as a URL. Recommended to be the fully qualified domain name of the source provider, or the URL to the source object
      type: string
      x-ngsi:
        type: Property
    toDate:
      description: ISO 8601 UTC end of the metocean period covered by this entity
      format: date-time
      type: string
      x-ngsi:
        type: Property
    type:
      description: NGSI Entity type. It has to be Metocean
      enum:
        - Metocean
      type: string
      x-ngsi:
        type: Property
  required:
    - id
    - type
  type: object
  x-derived-from: ''
